---

variables:
  - &file Dockerfile
  - &dhub https://index.docker.io/v1/
  - &arch linux/amd64,linux/i386,linux/arm/v7,linux/arm64/v8
  - &repo bksolutions/picapport
  - &branch release


steps:
  download-app:
    group: prepare
    image: alpine/curl
    commands:
      - curl https://www.picapport.de/download/6-3-06/picapport-headless.jar --output ./picapport-headless-6-3-06.jar
    when:
      branch: *branch


  build:
    image: woodpeckerci/plugin-docker-buildx
    group: build
    settings:
      dockerfile: *file
      build_args:
        - VERSION=6-3-06
      platforms: *arch
      dry_run: false
      repo: *repo
      tags:
        - '6-3-06'
      registry: *dhub
      logins:
        - registry: *dhub
          username:
            from_secret: DOCKER_BKSOL_USER
          password:
            from_secret: DOCKER_BKSOL_PASS
    when:
      branch: *branch